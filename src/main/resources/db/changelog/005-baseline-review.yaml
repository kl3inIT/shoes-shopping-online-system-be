databaseChangeLog:
  - changeSet:
      id: 005-baseline-review
      author: codex
      changes:
        - createTable:
            tableName: reviews
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_reviews
                    nullable: false
              - column:
                  name: version
                  type: bigint
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: shoe_variant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: number_stars
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: helpful_count
                  type: bigint
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: reviews
            columnNames: shoe_variant_id, customer_id
            constraintName: uk_review_customer_variant
        - createIndex:
            tableName: reviews
            indexName: idx_reviews_customer_id
            columns:
              - column:
                  name: customer_id
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: shoe_variant_id
            referencedTableName: shoe_variants
            referencedColumnNames: id
            constraintName: fk_reviews_shoe_variant
        - addForeignKeyConstraint:
            baseTableName: reviews
            baseColumnNames: customer_id
            referencedTableName: customers
            referencedColumnNames: id
            constraintName: fk_reviews_customer
        - createTable:
            tableName: review_images
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_review_images
                    nullable: false
              - column:
                  name: version
                  type: bigint
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: url
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: review_id
                  type: uuid
                  constraints:
                    nullable: false
        - createIndex:
            tableName: review_images
            indexName: idx_review_images_review_id
            columns:
              - column:
                  name: review_id
        - addForeignKeyConstraint:
            baseTableName: review_images
            baseColumnNames: review_id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_review_images_review
        - createTable:
            tableName: review_helpful_votes
            columns:
              - column:
                  name: review_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: review_helpful_votes
            columnNames: review_id, customer_id
            constraintName: pk_review_helpful_votes
        - createIndex:
            tableName: review_helpful_votes
            indexName: idx_review_helpful_votes_customer_id
            columns:
              - column:
                  name: customer_id
        - addForeignKeyConstraint:
            baseTableName: review_helpful_votes
            baseColumnNames: review_id
            referencedTableName: reviews
            referencedColumnNames: id
            constraintName: fk_review_helpful_votes_review
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: review_helpful_votes
            baseColumnNames: customer_id
            referencedTableName: customers
            referencedColumnNames: id
            constraintName: fk_review_helpful_votes_customer
            onDelete: CASCADE
