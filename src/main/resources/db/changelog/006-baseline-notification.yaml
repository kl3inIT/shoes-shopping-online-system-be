databaseChangeLog:
  - changeSet:
      id: 006-baseline-notification
      author: codex
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_notifications
                    nullable: false
              - column:
                  name: version
                  type: bigint
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
        - createTable:
            tableName: user_notifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_notifications
                    nullable: false
              - column:
                  name: version
                  type: bigint
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_by
                  type: uuid
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: notification_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: boolean
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_notifications_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: notification_id
            referencedTableName: notifications
            referencedColumnNames: id
            constraintName: fk_user_notifications_notification
            onDelete: CASCADE
        - createIndex:
            tableName: user_notifications
            indexName: idx_user_notifications_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: user_notifications
            indexName: idx_user_notifications_notification_id
            columns:
              - column:
                  name: notification_id
