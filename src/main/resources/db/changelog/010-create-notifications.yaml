databaseChangeLog:
  - changeSet:
      id: 010-create-notifications-table
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: notifications
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_notifications
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_by
                  type: UUID
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
  - changeSet:
      id: 010-create-user-notifications-table
      author: codex
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: user_notifications
      changes:
        - createTable:
            tableName: user_notifications
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_notifications
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_by
                  type: UUID
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: notification_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: BOOLEAN
                  constraints:
                    nullable: false
  - changeSet:
      id: 010-add-user-notification-constraints
      author: codex
      preConditions:
        onFail: MARK_RAN
        and:
          - tableExists:
              tableName: user_notifications
          - tableExists:
              tableName: notifications
          - not:
              foreignKeyConstraintExists:
                foreignKeyName: fk_user_notifications_user
          - not:
              foreignKeyConstraintExists:
                foreignKeyName: fk_user_notifications_notification
      changes:
        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: user_id
            constraintName: fk_user_notifications_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_notifications
            baseColumnNames: notification_id
            constraintName: fk_user_notifications_notification
            referencedTableName: notifications
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            tableName: user_notifications
            indexName: idx_user_notifications_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: user_notifications
            indexName: idx_user_notifications_notification_id
            columns:
              - column:
                  name: notification_id
