databaseChangeLog:
  - changeSet:
      id: 009-create-review-helpful-votes
      author: cursor-ai
      changes:
        - createTable:
            tableName: review_helpful_votes
            columns:
              - column:
                  name: review_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: review_helpful_votes
            columnNames: review_id, customer_id
            constraintName: pk_review_helpful_votes
        - addForeignKeyConstraint:
            baseTableName: review_helpful_votes
            baseColumnNames: review_id
            constraintName: fk_review_helpful_votes_review
            referencedTableName: reviews
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: review_helpful_votes
            baseColumnNames: customer_id
            constraintName: fk_review_helpful_votes_customer
            referencedTableName: customers
            referencedColumnNames: id
            onDelete: CASCADE

