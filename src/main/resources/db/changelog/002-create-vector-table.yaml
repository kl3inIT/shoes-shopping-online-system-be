databaseChangeLog:
  - changeSet:
      id: 002-enable-pgvector
      author: phd
      changes:
        - sql:
            sql: CREATE EXTENSION IF NOT EXISTS vector;

  - changeSet:
      id: 003-create-ai-documents
      author: sba
      changes:
        - createTable:
            tableName: ai_documents
            columns:

              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: content
                  type: text

              - column:
                  name: metadata
                  type: jsonb

              - column:
                  name: embedding
                  type: vector(1536)

  - changeSet:
      id: 004-create-cosine-index
      author: phd
      changes:
        - sql:
            sql: |
              CREATE INDEX IF NOT EXISTS idx_ai_documents_embedding
              ON ai_documents
              USING ivfflat (embedding vector_cosine_ops)
              WITH (lists = 100);