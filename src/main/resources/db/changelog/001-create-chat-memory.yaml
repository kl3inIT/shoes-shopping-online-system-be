databaseChangeLog:
  - changeSet:
      id: 001-create-chat-memory
      author: sba
      changes:

        - createTable:
            tableName: chat_memory
            columns:

              - column:
                  name: conversation_id
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: content
                  type: text

              - column:
                  name: type
                  type: varchar(50)

              - column:
                  name: timestamp
                  type: timestamp
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: chat_memory
            columnNames: conversation_id, timestamp
            constraintName: pk_chat_memory

        - createIndex:
            indexName: idx_chat_memory_conversation
            tableName: chat_memory
            columns:
              - column:
                  name: conversation_id