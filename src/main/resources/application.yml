application-properties:

  sepay-properties:
    sepay-username: ${SEPAY_USERNAME}
    sepay-password: ${SEPAY_PASSWORD}

  bank-properties:
    bank-number: 22226376222
    bank-code: TPBANK
    account-holder: NHU DINH NHAT

  keycloak-properties:
    realm-name: ${KEYCLOAK_REALM:ssos-realm}
    client-id: ${KEYCLOAK_CLIENT_ID:ssos-app}
    server-url: ${KEYCLOAK_HOST:}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:}
    token-url: ${KEYCLOAK_TOKEN_URL}
    accept-clients:
      - ssos-app
      - ssos-sepay

  rag-properties:
    schema: public
    table: ai_documents
    dimensions: 1536
    ingest-on-boot: true
    chunk-size: 800
    distance: COSINE
  minio-properties:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:ssos-images}
    presigned-expiry-seconds: ${MINIO_PRESIGNED_EXPIRY_SECONDS:3600}

  chat-properties:
    max-request-length: 2000

  security-properties:
    admin-endpoints:
      - { method: POST, path: /api/payments/sepay/hook }
      - { method: GET, path: /api/categories }
      - { method: POST, path: /api/categories }
      - { method: PUT, path: /api/categories/* }
      - { method: DELETE, path: /api/categories/* }
      - { method: GET, path: /api/shoes }
      - { method: GET, path: /api/shoes/* }
      - { method: POST, path: /api/shoes }
      - { method: PUT, path: /api/shoes/* }
      - { method: PATCH, path: /api/shoes/*/status }
      - { method: GET, path: /api/brands }
      - { method: GET, path: /api/brands/* }
      - { method: POST, path: /api/brands }
      - { method: PUT, path: /api/brands/* }
      - { method: POST, path: /api/files/upload }
      - { method: POST, path: /api/files/upload-multiple }
      - { method: GET, path: /api/files/* }
      - { method: DELETE, path: /api/brands/* }
      - { method: GET, path: /api/storage/presigned-url }
      - { method: DELETE, path: /api/storage }
      - { method: GET, path: /api/orders/admin }
      - { method: GET, path: /admin/dashboard/metrics }
      - { method: GET, path: /admin/dashboard/chart }
      - { method: GET, path: /admin/dashboard/recent-orders }
      - { method: GET, path: /admin/dashboard/top-selling }
      - { method: GET, path: /admin/dashboard/low-stock }
      - { method: GET, path: /admin/notifications }
      - { method: POST, path: /admin/notifications/broadcast }
    manager-endpoints:
      - { method: GET, path: /test/manager }
    customer-endpoints:
      - { method: GET, path: /api/orders }
      - { method: POST, path: /api/orders/init }
      - { method: GET, path: /api/wishlist }
      - { method: POST, path: /api/wishlist }
      - { method: DELETE, path: /api/wishlist/* }
      - { method: GET, path: /api/cart }
      - { method: POST, path: /api/cart }
      - { method: PUT, path: /api/cart/* }
      - { method: DELETE, path: /api/cart/* }
      - { method: DELETE, path: /api/cart }
      - { method: POST, path: /api/v1/chat }
    webhook-endpoints:
      - { method: POST, path: /api/payments/sepay/hook }
    public-endpoints:
      - { method: GET, path: /user }
      - { method: POST, path: /webhook/keycloak/register }
      - { method: POST, path: /sepay/auth/token }
      - { method: GET, path: /api/categories }
      - { method: GET, path: /api/categories/* }
      - { method: GET, path: /api/brands }
      - { method: GET, path: /api/brands/* }
      - { method: POST, path: /api/categories }
      - { method: PUT, path: /api/categories/* }
      - { method: DELETE, path: /api/categories/* }
      - { method: POST, path: /api/shoes }
      - { method: GET, path: /api/shoes }
      - { method: GET, path: /api/shoes/* }
      - { method: PUT, path: /api/shoes/* }
      - { method: PATCH, path: /api/shoes/*/status }
      - { method: GET, path: /api/shoes/*/variants }
      - { method: GET, path: /api/files/** }
      - { method: POST, path: /api/payments/sepay/hook }
      - { method: POST, path: /webhook/keycloak/register }
      - { method: POST, path: /sepay/auth/token }
      - { method: POST, path: /api/files/upload }
      - { method: POST, path: /api/files/upload-multiple }
      - { method: GET, path: /api/files/* }

      - { method: POST, path: /webhook/keycloak/register }
      - { method: POST, path: /sepay/auth/token }
      - { method: GET, path: /api/categories }
      - { method: GET, path: /api/categories/* }
      - { method: GET, path: /api/shoes/*/variants }
      - { method: POST, path: /api/v1/chat }


    public-urls:
      # OpenAPI Swagger URLs
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v3/api-docs.yaml
      # Actuator endpoints:
      - /actuator/**
      # Custom no-auth URLs:
      - /test/free
      - /chat
      - /api/v1/*
