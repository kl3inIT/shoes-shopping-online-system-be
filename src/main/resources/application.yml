spring:
  config:
    import: "classpath:application-properties.yml"
  application:
    name: shoes-shopping-online-system
  profiles:
    default: dev
  threads:
    virtual:
      enabled: true
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/master.yaml
  jpa:
    open-in-view: false
  ai:
    chat:
      client:
        enabled: ${SPRING_AI_CHAT_CLIENT_ENABLED:false}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.2}
          max-tokens: ${OPENAI_CHAT_MAX_TOKENS:1024}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.0-flash}
            temperature: ${GEMINI_CHAT_TEMPERATURE:0.2}
            max-output-tokens: ${GEMINI_CHAT_MAX_OUTPUT_TOKENS:1024}

server:
  port: ${SERVER_PORT:8088}
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
