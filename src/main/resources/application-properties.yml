application-properties:

  sepay-properties:
    sepay-username: ${SEPAY_USERNAME}
    sepay-password: ${SEPAY_PASSWORD}

  bank-properties:
    bank-number: 22226376222
    bank-code: TPBANK
    account-holder: NHU DINH NHAT

  keycloak-properties:
    realm-name: ${KEYCLOAK_REALM:ssos-realm}
    client-id: ${KEYCLOAK_CLIENT_ID:ssos-app}
    server-url: ${KEYCLOAK_HOST:}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:}
    token-url: ${KEYCLOAK_TOKEN_URL}
    accept-clients:
      - ssos-app
      - ssos-sepay

  rag-properties:
    schema: public
    table: ai_documents
    dimensions: 1536
    ingest-on-boot: true
    chunk-size: 800
    distance: COSINE

  minio-properties:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:ssos-images}
    presigned-expiry-seconds: ${MINIO_PRESIGNED_EXPIRY_SECONDS:3600}

  chat-properties:
    max-request-length: 2000

  security-properties:
    keycloak-webhook-secret: ${KEYCLOAK_WEBHOOK_SECRET}
    admin-endpoints:
      # Admin management APIs
      - { method: POST, path: /api/categories }
      - { method: PUT, path: /api/categories/* }
      - { method: DELETE, path: /api/categories/* }
      - { method: POST, path: /api/shoes }
      - { method: PUT, path: /api/shoes/* }
      - { method: PATCH, path: /api/shoes/*/status }
      - { method: POST, path: /api/brands }
      - { method: PUT, path: /api/brands/* }
      - { method: DELETE, path: /api/brands/* }
      - { method: DELETE, path: /api/storage }
      - { method: GET, path: /api/orders/admin }
      # AI admin/debug APIs
      - { method: GET, path: /api/v1/ai-parameters }
      - { method: GET, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ai-parameters }
      - { method: POST, path: /api/v1/ai-parameters/from-default }
      - { method: PUT, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ai-parameters/*/activate }
      - { method: POST, path: /api/v1/ai-parameters/*/copy }
      - { method: DELETE, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ingestion/run }
      - { method: POST, path: /api/v1/ingestion/run/* }
      - { method: GET, path: /api/v1/ingestion/types }
      - { method: POST, path: /api/v1/checks/run }
      - { method: GET, path: /api/v1/checks/runs/* }
      - { method: POST, path: /api/v1/search }
      # User management APIs
      - { method: GET, path: /api/admin/users }
      - { method: POST, path: /api/admin/users }
      - { method: PATCH, path: /api/admin/users/*/role }
      - { method: PATCH, path: /api/admin/users/*/status }
      - { method: DELETE, path: /api/admin/users/* }
      # Dashboard / notifications
      - { method: GET, path: /admin/dashboard/metrics }
      - { method: GET, path: /admin/dashboard/chart }
      - { method: GET, path: /admin/dashboard/recent-orders }
      - { method: GET, path: /admin/dashboard/top-selling }
      - { method: GET, path: /admin/dashboard/low-stock }
      - { method: GET, path: /admin/notifications }
      - { method: POST, path: /admin/notifications/broadcast }
    manager-endpoints:
      # Reserved for manager-only APIs (add when needed)
      - { method: GET, path: /test/manager }
    customer-endpoints:
      # Profile APIs
      - { method: GET, path: /users/me }
      - { method: PATCH, path: /users/me }
      - { method: POST, path: /users/me/avatar }
      # Customer APIs (requires ROLE_CUSTOMER)
      - { method: GET, path: /api/orders }
      - { method: POST, path: /api/orders/init }
      - { method: GET, path: /api/wishlist }
      - { method: POST, path: /api/wishlist }
      - { method: DELETE, path: /api/wishlist/* }
      - { method: GET, path: /api/cart }
      - { method: POST, path: /api/cart }
      - { method: PUT, path: /api/cart/* }
      - { method: DELETE, path: /api/cart/* }
      - { method: DELETE, path: /api/cart }
      - { method: POST, path: /api/v1/chat }
      # Storage (for avatar upload)
      - { method: GET, path: /api/storage/presigned-url }
      # Review helpful votes
      - { method: POST, path: /api/reviews/*/helpful }
    webhook-endpoints:
      # Webhooks (requires ROLE_SEPAY_WEBHOOK)
      - { method: POST, path: /api/payments/sepay/hook }
    public-endpoints:
      # Public endpoints
      - { method: POST, path: /sepay/auth/token }
      - { method: POST, path: /keycloak/webhook/user-registration }
      # Public read-only catalog APIs
      - { method: GET, path: /api/categories }
      - { method: GET, path: /api/categories/* }
      - { method: GET, path: /api/brands }
      - { method: GET, path: /api/brands/* }
      - { method: GET, path: /api/shoes }
      - { method: GET, path: /api/shoes/* }
      - { method: GET, path: /api/shoes/*/variants }
      - { method: GET, path: /api/reviews/shoe/* }
      # Public file access (GET only)
      - { method: GET, path: /api/files/** }


    public-urls:
      # OpenAPI Swagger URLs
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v3/api-docs.yaml
      # Actuator endpoints:
      - /actuator/**
      # Custom no-auth URLs:
      - /test/free
      - /chat
      - /api/v1/*
