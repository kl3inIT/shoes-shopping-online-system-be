application-properties:

  sepay-properties:
    sepay-username: ${SEPAY_USERNAME:}
    sepay-password: ${SEPAY_PASSWORD:}

  bank-properties:
    bank-number: ${BANK_NUMBER:22226376222}
    bank-code: ${BANK_CODE:TPBANK}
    account-holder: ${BANK_ACCOUNT_HOLDER:NHU DINH NHAT}

  keycloak-properties:
    realm-name: ${KEYCLOAK_REALM:ssos-realm}
    client-id: ${KEYCLOAK_CLIENT_ID:ssos-app}
    server-url: ${KEYCLOAK_SERVER_URL:${KEYCLOAK_HOST:}}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-realm-name: ${KEYCLOAK_ADMIN_REALM:master}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:}
    token-url: ${KEYCLOAK_TOKEN_URL}
    accept-clients:
      - ssos-app
      - ssos-sepay

  rag-properties:
    schema: ${RAG_SCHEMA:${POSTGRESQL_SCHEMA:public}}
    table: ${RAG_TABLE:ai_documents}
    dimensions: ${RAG_DIMENSIONS:1536}
    ingest-on-boot: ${RAG_INGEST_ON_BOOT:false}
    chunk-size: ${RAG_CHUNK_SIZE:800}
    distance: ${RAG_DISTANCE:COSINE}

  minio-properties:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:ssos-images}
    presigned-expiry-seconds: ${MINIO_PRESIGNED_EXPIRY_SECONDS:3600}

  chat-properties:
    max-request-length: 2000

  security-properties:
    # TODO: Set to true once X-Keycloak-Secret header can be configured on the Keycloak side.
    # Also provide KEYCLOAK_WEBHOOK_SECRET env var with the matching secret value.
    webhook-security-enabled: ${KEYCLOAK_WEBHOOK_SECURITY_ENABLED:false}
    keycloak-webhook-secret: ${KEYCLOAK_WEBHOOK_SECRET:disabled}
    admin-endpoints:
      # Admin management APIs
      - { method: POST, path: /api/v1/categories }
      - { method: PUT, path: /api/v1/categories/* }
      - { method: DELETE, path: /api/v1/categories/* }
      - { method: POST, path: /api/v1/shoes }
      - { method: PUT, path: /api/v1/shoes/* }
      - { method: POST, path: /api/v1/brands }
      - { method: PUT, path: /api/v1/brands/* }
      - { method: DELETE, path: /api/v1/brands/* }
      - { method: DELETE, path: /api/v1/storage }
      # AI admin/debug APIs
      - { method: GET, path: /api/v1/ai-parameters }
      - { method: GET, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ai-parameters }
      - { method: POST, path: /api/v1/ai-parameters/from-default }
      - { method: PUT, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ai-parameters/*/activate }
      - { method: POST, path: /api/v1/ai-parameters/*/copy }
      - { method: DELETE, path: /api/v1/ai-parameters/* }
      - { method: POST, path: /api/v1/ingestion/run }
      - { method: POST, path: /api/v1/ingestion/run/* }
      - { method: GET, path: /api/v1/ingestion/types }
      - { method: POST, path: /api/v1/search }
      # Chat log admin APIs
      - { method: GET, path: /api/v1/admin/chat-logs }
      - { method: GET, path: /api/v1/admin/chat-logs/* }
      # User management APIs
      - { method: GET, path: /api/v1/admin/users/stats }
      - { method: GET, path: /api/v1/admin/users }
      - { method: POST, path: /api/v1/admin/users }
      - { method: PATCH, path: /api/v1/admin/users/*/role }
      - { method: PATCH, path: /api/v1/admin/users/*/status }
      - { method: POST, path: /api/v1/admin/users/*/status/toggle }
      - { method: DELETE, path: /api/v1/admin/users/* }
      # Vector store admin APIs
      - { method: GET, path: /api/v1/admin/vector-store/documents }
      - { method: GET, path: /api/v1/admin/vector-store/documents/* }
      - { method: DELETE, path: /api/v1/admin/vector-store/documents/bulk }
      - { method: DELETE, path: /api/v1/admin/vector-store/documents/* }
      - { method: DELETE, path: /api/v1/admin/vector-store/documents }
      # Check definition and run admin APIs
      - { method: GET, path: /api/v1/admin/checks/definitions }
      - { method: POST, path: /api/v1/admin/checks/definitions }
      - { method: PUT, path: /api/v1/admin/checks/definitions/* }
      - { method: DELETE, path: /api/v1/admin/checks/definitions/* }
      - { method: POST, path: /api/v1/admin/checks/runs }
      - { method: GET, path: /api/v1/admin/checks/runs }
      - { method: GET, path: /api/v1/admin/checks/runs/*/results }
      # Dashboard / notifications
      - { method: GET, path: /api/v1/admin/dashboard/metrics }
      - { method: GET, path: /api/v1/admin/dashboard/chart }
      - { method: GET, path: /api/v1/admin/dashboard/recent-orders }
      - { method: GET, path: /api/v1/admin/dashboard/top-selling }
      - { method: GET, path: /api/v1/admin/dashboard/low-stock }
      - { method: GET, path: /api/v1/admin/notifications }
      - { method: POST, path: /api/v1/admin/notifications/broadcast }
    manager-endpoints:
      # Manager APIs
      - { method: GET, path: /api/v1/admin/orders }
      - { method: GET, path: /test/manager }
    customer-endpoints:
      # Profile APIs
      - { method: GET, path: /api/v1/users/me }
      - { method: PATCH, path: /api/v1/users/me }
      - { method: POST, path: /api/v1/users/me/avatar }
      # Customer APIs (requires ROLE_CUSTOMER)
      - { method: GET, path: /api/v1/orders }
      - { method: GET, path: /api/v1/orders/* }
      - { method: GET, path: /api/v1/orders/payment-info/* }
      - { method: POST, path: /api/v1/orders/init }
      - { method: POST, path: /api/v1/orders/expired }
      - { method: GET, path: /api/v1/wishlist }
      - { method: POST, path: /api/v1/wishlist }
      - { method: DELETE, path: /api/v1/wishlist/* }
      - { method: GET, path: /api/v1/cart }
      - { method: POST, path: /api/v1/cart }
      - { method: PUT, path: /api/v1/cart/* }
      - { method: DELETE, path: /api/v1/cart/* }
      - { method: DELETE, path: /api/v1/cart }
      - { method: POST, path: /api/v1/chat }
      # Storage (for avatar upload)
      - { method: GET, path: /api/v1/storage/presigned-url }
      # Review helpful votes
      - { method: POST, path: /api/v1/reviews/*/helpful }
    webhook-endpoints:
      # Webhooks (requires ROLE_SEPAY_WEBHOOK)
      - { method: POST, path: /api/v1/webhooks/orders/sepay/hook }
    public-endpoints:
      # Public endpoints
      - { method: POST, path: /api/v1/sepay/auth/token }
      - { method: POST, path: /api/v1/webhooks/keycloak/users/registration }
      # Public read-only catalog APIs
      - { method: GET, path: /api/v1/categories }
      - { method: GET, path: /api/v1/categories/* }
      - { method: GET, path: /api/v1/brands }
      - { method: GET, path: /api/v1/brands/* }
      - { method: GET, path: /api/v1/shoes }
      - { method: GET, path: /api/v1/shoes/* }
      - { method: GET, path: /api/v1/shoes/*/variants }
      - { method: GET, path: /api/v1/reviews/shoe/* }
      # Public file access (GET only)
      - { method: GET, path: /api/files/** }
    public-urls:
      # OpenAPI Swagger URLs
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v3/api-docs.yaml
      # Actuator endpoints:
      - /actuator/**
      # Custom no-auth URLs:
      - /test/free
      - /chat
      - /ws
      - /ws/**
